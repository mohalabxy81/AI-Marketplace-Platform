name: CI — AI Marketplace Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1 — Lint & Type Check
  # ─────────────────────────────────────────────────────────
  lint-and-type-check:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: company-dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: company-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────
  # JOB 2 — Unit & Integration Tests
  # ─────────────────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    defaults:
      run:
        working-directory: company-dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: company-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test --if-present
        env:
          CI: true

  # ─────────────────────────────────────────────────────────
  # JOB 3 — Supabase Schema Validation
  # ─────────────────────────────────────────────────────────
  supabase-db-lint:
    name: 🗄️ Supabase DB Lint
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Lint Supabase DB migrations
        run: supabase db lint --local
        working-directory: pr1
        continue-on-error: true

  # ─────────────────────────────────────────────────────────
  # JOB 4 — Security Scan
  # ─────────────────────────────────────────────────────────
  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install audit dependencies
        run: pip install bandit semgrep --quiet

      - name: Run security scan
        run: python .agent/scripts/checklist.py . --ci
        continue-on-error: true

  # ─────────────────────────────────────────────────────────
  # JOB 5 — Next.js Build Check
  # ─────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test]
    defaults:
      run:
        working-directory: company-dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: company-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-key' }}
          NEXT_TELEMETRY_DISABLED: 1
